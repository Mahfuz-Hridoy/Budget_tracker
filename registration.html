<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Tracker — Register</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
  <main class="auth-page">
    <section class="auth-panel">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="logo-mark">💰</div>
          <span>MyWallet</span>
        </div>
        <h1>Create account</h1>
        <p class="auth-sub">Start tracking your finances today.</p>

        <form class="auth-form" id="registration-form" novalidate>
          <div class="form-field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required>
          </div>
          <div class="form-field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a password" required>
          </div>
          <div class="form-field">
            <label for="userName">Full Name</label>
            <input type="text" id="userName" name="userName" placeholder="Your display name" required>
          </div>
          <div class="form-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="auth-submit">Create account</button>
          <p id="error-message"></p>
        </form>

        <p class="auth-footer">
          Already have an account? <a href="index.html">Sign in</a>
        </p>
      </div>
    </section>

    <aside class="auth-side">
      <div class="auth-side-content">
        <span class="side-tag">Get Started</span>
        <h2>Your finances, finally under control.</h2>
        <p>Join thousands managing their budgets with clarity and confidence using MyWallet.</p>
        <div class="feature-list">
          <div class="feat"><span class="feat-dot"></span>Free to use, always</div>
          <div class="feat"><span class="feat-dot"></span>Private and secure</div>
          <div class="feat"><span class="feat-dot"></span>Setup in under a minute</div>
        </div>
      </div>
    </aside>
  </main>
  <script src="registration.js"></script>
</body>
</html>
