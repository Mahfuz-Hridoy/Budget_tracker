<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Income — MyWallet</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">💰</div>
        <h2>MyWallet</h2>
      </div>
      <nav>
        <a href="main.html"><img class="nav-icon" src="asset/dashboard (1).png" alt=""> Dashboard</a>
        <a href="add_income.html" class="active"><img class="nav-icon" src="asset/services.png" alt=""> Add Income</a>
        <a href="add_expense.html"><img class="nav-icon" src="asset/spending.png" alt=""> Add Expense</a>
        <a href="view_all_exp.html"><img class="nav-icon" src="asset/research.png" alt=""> View All</a>
        <a href="reset_budget.html"><img class="nav-icon" src="asset/circle-of-two-clockwise-arrows-rotation.png" alt=""> Reset</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1>Add Income</h1>
        <button id="logoutBtn">Sign out</button>
      </header>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-tag income-tag">Income</span>
          <h2>Record earnings</h2>
          <p>Add a new income entry to update your balance.</p>
        </div>

        <form class="form-stack" id="income-form" novalidate>
          <div class="form-field">
            <label for="income">Amount (Tk)</label>
            <input type="number" id="income" name="income" placeholder="e.g. 5000" min="0.01" step="0.01" required>
          </div>
          <button type="submit" class="form-submit">Add Income</button>
          <div class="success-message" id="success-msg">✓ Income added successfully!</div>
          <p class="error-msg" id="error-msg"></p>
        </form>
      </div>
    </main>
  </div>
  <script src="addincome.js"></script>
</body>
</html>
