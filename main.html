<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — MyWallet</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">💰</div>
        <h2>MyWallet</h2>
      </div>
      <nav>
        <a href="main.html" class="active">
          <img class="nav-icon" src="asset/dashboard (1).png" alt=""> Dashboard
        </a>
        <a href="add_income.html">
          <img class="nav-icon" src="asset/services.png" alt=""> Add Income
        </a>
        <a href="add_expense.html">
          <img class="nav-icon" src="asset/spending.png" alt=""> Add Expense
        </a>
        <a href="view_all_exp.html">
          <img class="nav-icon" src="asset/research.png" alt=""> View All
        </a>
        <a href="reset_budget.html">
          <img class="nav-icon" src="asset/circle-of-two-clockwise-arrows-rotation.png" alt=""> Reset
        </a>
      </nav>
      <div class="sidebar-footer">
        <span class="version">MyWallet v1.0</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1>Dashboard</h1>
        <div class="topbar-actions">
          <span class="greeting" id="greeting">Good day!</span>
          <button id="logoutBtn">Sign out</button>
        </div>
      </header>

      <section class="cards">
        <div class="card income">
          <div class="card-icon">💵</div>
          <div class="card-label">Total Income</div>
          <div class="card-amount" id="incomeAmt">—</div>
        </div>
        <div class="card expense">
          <div class="card-icon">💸</div>
          <div class="card-label">Total Expense</div>
          <div class="card-amount" id="expenseAmt">—</div>
        </div>
        <div class="card balance">
          <div class="card-icon">📊</div>
          <div class="card-label">Balance</div>
          <div class="card-amount" id="balanceAmt">—</div>
        </div>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
